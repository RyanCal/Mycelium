services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: mycelium
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: mycelium
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  kernel:
    image: ghcr.io/ryancal/mycelium-kernel:${MYCELIUM_TAG:-latest}
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - agent-data:/var/lib/mycelium/agents
    restart: unless-stopped

  worker:
    image: ghcr.io/ryancal/mycelium-kernel:${MYCELIUM_TAG:-latest}
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - agent-data:/var/lib/mycelium/agents
    command: ["uv", "run", "arq", "mycelium.core.workers.arq_worker.WorkerSettings"]
    restart: unless-stopped

  ui:
    image: ghcr.io/ryancal/mycelium-ui:${MYCELIUM_TAG:-latest}
    environment:
      MYCELIUM_API_BASE_URL: http://kernel:8000
      MYCELIUM_ADMIN_TOKEN: ${MYCELIUM_ADMIN_TOKEN}
    depends_on:
      - kernel
    restart: unless-stopped

volumes:
  postgres-data:
  agent-data:
