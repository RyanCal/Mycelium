services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: mycelium
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: mycelium
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mycelium -d mycelium"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  migrate:
    image: ghcr.io/ryancal/mycelium-kernel:${MYCELIUM_TAG:-latest}
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://mycelium:${POSTGRES_PASSWORD}@db:5432/mycelium
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      [
        "sh",
        "-c",
        "uv run alembic upgrade head && uv run python -m mycelium.db.seed",
      ]
    restart: "no"

  kernel:
    image: ghcr.io/ryancal/mycelium-kernel:${MYCELIUM_TAG:-latest}
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://mycelium:${POSTGRES_PASSWORD}@db:5432/mycelium
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - agent-data:/var/lib/mycelium/agents
    restart: unless-stopped

  worker:
    image: ghcr.io/ryancal/mycelium-kernel:${MYCELIUM_TAG:-latest}
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://mycelium:${POSTGRES_PASSWORD}@db:5432/mycelium
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - agent-data:/var/lib/mycelium/agents
    command: ["uv", "run", "arq", "mycelium.core.workers.arq_worker.WorkerSettings"]
    restart: unless-stopped

  ui:
    image: ghcr.io/ryancal/mycelium-ui:${MYCELIUM_TAG:-latest}
    environment:
      MYCELIUM_API_BASE_URL: http://kernel:8000
      MYCELIUM_ADMIN_TOKEN: ${MYCELIUM_ADMIN_TOKEN}
    depends_on:
      - kernel
    restart: unless-stopped

volumes:
  postgres-data:
  agent-data:
