name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mycelium
    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: mycelium
          POSTGRES_PASSWORD: mycelium
          POSTGRES_DB: mycelium
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mycelium -d mycelium"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
        with:
          path: mycelium
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --locked --dev
      - run: uv run ruff check .
      - run: ./scripts/mypy_check.sh
      - run: uv run alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://mycelium:mycelium@localhost:5432/mycelium
          REDIS_URL: redis://localhost:6379/0
      - run: uv run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://mycelium:mycelium@localhost:5432/mycelium
          REDIS_URL: redis://localhost:6379/0
